                for (let i = 0; i < (duration || 1); i++) {
                    const slotTime = TIME_SLOTS[startIndex + i];

                    map[date][slotTime] = [...new Set([...map[date][slotTime], ...(selectedCompanies || [])])];

            });

                const closedStart = new Date('2026/05/02').getTime();
                const closedEnd = new Date('2026/05/06').getTime();
                if (date.getTime() >= closedStart && date.getTime() <= closedEnd) return 'closed';
                if (CLOSED_DAYS.includes(date.getDay())) return 'closed';
                return TIME_SLOTS.some(t => isEditSlotAvailable(dateString, t)) ? 'available' : 'full';
            };

            // 本人確認済みメール＋電話に一致する予約（新しい順に並べ替え）
            const myReservations = useMemo(() => {
                if (!authedEmail) return [];
                const email = authedEmail.trim().toLowerCase();
                const phone = normalizePhone(authedPhone);
                return reservations
                    .filter(r => (r.email || "").trim().toLowerCase() === email && normalizePhone(r.phone) === phone)
                    .sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.time || "").localeCompare(b.time || ""));
            }, [reservations, authedEmail, authedPhone]);

            const showNotification = (msg, type = 'success') => {
                setNotification({ msg, type });
                setTimeout(() => setNotification(null), 5000);
            };

            const navigateToView = (targetView) => {
                setView(targetView);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const changeStaffTab = (tab) => {
                setStaffTab(tab);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleStaffAuth = async (e) => {
                e.preventDefault();
                if (await sha256Hex(loginPass) === STAFF_PASSCODE_HASH) {
                    setIsStaffAuthenticated(true);
                    sessionStorage.setItem('isStaffAuth', 'true');
                    setShowLoginModal(false);
                    setLoginPass("");
                    navigateToView('staff_dashboard');
                    showNotification("ログインしました。");
                } else {
                    showNotification("パスワードが違います。", "error");
                }
            };

            const handleStaffLogout = () => {
                setIsStaffAuthenticated(false);
                sessionStorage.removeItem('isStaffAuth');
                navigateToView('customer_form');
                showNotification("ログアウトしました。");
            };

            const getCleanEmails = (emails) => (emails || []).filter(e => e.trim() !== "");
            const isCenterDirty = JSON.stringify(getCleanEmails(centerEmails)) !== JSON.stringify(getCleanEmails(savedCenterEmails));
            const isCompanyDirty = (id) => JSON.stringify(getCleanEmails(companyEmails[id])) !== JSON.stringify(getCleanEmails(savedCompanyEmails[id]));
            const isHolidaysDirty = JSON.stringify([...closedDates].sort()) !== JSON.stringify([...savedClosedDates].sort());

            const saveCompanyEmails = async (companyId, emails) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('company_emails').doc(companyId).set({
                        emails: emails.filter(Boolean),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showNotification("保存しました。");
                } catch (err) { showNotification("エラー", "error"); }
            };

            const saveCenterEmails = async (emails) => {
                try {
                    const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('center_emails').get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));

                    emails.filter(Boolean).forEach((email, idx) => {
                        const ref = db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('center_emails').doc(`center_${idx}`);
                        batch.set(ref, { email });
                    });
                    await batch.commit();
                    showNotification("センター設定を保存しました。");
                } catch (err) { showNotification("保存失敗", "error"); }
            };

            // ★ 休日設定の保存処理 ★
            const saveHolidays = async () => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('general').doc('holidays').set({
                        dates: closedDates,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    showNotification("休日設定を保存しました。");
                } catch (err) { showNotification("保存失敗", "error"); }
            };

            // === メール送信枠アラート通知先の保存 ===
            const isMailAlertDirty = JSON.stringify(getCleanEmails(mailAlertEmails)) !== JSON.stringify(getCleanEmails(savedMailAlertEmails));
            const saveMailAlertEmails = async () => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('general').doc('mail_alert').set({
                        emails: mailAlertEmails.filter(Boolean),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                    showNotification("アラート通知先を保存しました。");
                } catch (err) { showNotification("保存失敗", "error"); }
            };

            // === 閾値到達時のアラートメール送信（決めた宛先へ） ===
            const sendUsageAlert = (count, threshold) => {
                if (typeof emailjs === 'undefined' || EMAILJS_CONFIG.publicKey === "YOUR_PUBLIC_KEY") return;
                const recipients = (getCleanEmails(mailAlertEmails).length ? getCleanEmails(mailAlertEmails)
                                    : (centerEmails.length ? centerEmails : [CENTER_EMAIL])).filter(Boolean);
                if (!recipients.length) return;
                const remaining = MAIL_LIMIT - count;
                const params = {
                    entry_type: "【重要】メール送信枠アラート",
                    status_message: `今月の自動メール送信数が ${count}通／${MAIL_LIMIT}通 に達しました（残り約${remaining}通）。残数が0になると、予約確認・変更・キャンセルの自動メールが送信できなくなります。EmailJSの枠追加、または通知先の見直しをご検討ください。`,
                    user_name: "システム自動通知",
                    user_furigana: "-", user_email: "-", reservation_no: "-",
                    reservation_date: currentUsageMonth() + " 時点", reservation_time: "-",
                    companies: "-", visitor_count: "-",
                    notes: `しきい値 ${threshold}通 を超過しました。`,
                    staff_name: "-", cancel_reason: "-", cancel_staff: "-",
                    created_at: new Date().toLocaleString(), reply_to: CENTER_EMAIL
                };
                const proms = recipients.map(to => emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateIdStaff, { ...params, to_email: to }));
                Promise.allSettled(proms);
                // アラートメール自体も枠を消費するのでカウントに加算（しきい値の再判定はしない）
                db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('general').doc('mail_usage')
                    .set({ count: firebase.firestore.FieldValue.increment(recipients.length) }, { merge: true }).catch(() => {});
            };

            // === 送信数のカウント（トランザクションで月次リセット＆閾値判定） ===
            const recordMailUsage = async (n) => {
                if (!n || n <= 0) return;
                const month = currentUsageMonth();
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('settings').collection('general').doc('mail_usage');
                let toAlert = [], newCount = 0;
                try {
                    await db.runTransaction(async (tx) => {
                        const snap = await tx.get(ref);
                        const data = snap.exists ? snap.data() : null;
                        let count, alerted;
                        if (!data || data.month !== month) { count = 0; alerted = []; } // 月が変わったらリセット
                        else { count = data.count || 0; alerted = data.alerted || []; }
                        count += n;
                        newCount = count;
                        toAlert = MAIL_ALERT_THRESHOLDS.filter(t => count >= t && !alerted.includes(t));
                        tx.set(ref, { month, count, alerted: [...alerted, ...toAlert], updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    });
                    if (toAlert.length) sendUsageAlert(newCount, Math.max(...toAlert));
                } catch (e) { console.warn("mail usage record failed:", e); }
            };

            // kind: 'new'（新規） | 'change'（日時変更） | 'cancel'（キャンセル）
            const sendMails = (data, kind = 'new') => {
                if (typeof emailjs === 'undefined' || EMAILJS_CONFIG.publicKey === "YOUR_PUBLIC_KEY") return;
                if (kind === true) kind = 'cancel'; // 旧呼び出し(boolean)との互換

                const createdTime = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : new Date().toLocaleString();

                const KIND_INFO = {
                    new:    { entry: "【新規予約受付】", msg: "以下の内容でご予約を承りました。" },
                    cancel: { entry: "【キャンセル通知】", msg: "以下のご予約が取り消されました。" },
                    change: { entry: "【予約日時の変更】",
                              msg: `ご予約の日時が変更されました。　（変更前）${formatNiceDate(data.oldDate)} ${data.oldTime}　→　（変更後）${formatNiceDate(data.date)} ${data.time}` }
                };
                const info = KIND_INFO[kind] || KIND_INFO.new;

                const templateParams = {
                    user_name: data.name,
                    user_furigana: data.furigana,
                    user_email: data.email || "未登録",
                    reservation_no: getResNo(data.id),
                    reservation_date: data.date,
                    reservation_time: data.time,
                    companies: (data.selectedCompanies || []).join('、'),
                    visitor_count: data.visitorCount,
                    notes: data.notes || "特になし",
                    staff_name: data.staffName || "一般予約",
                    entry_type: info.entry,
                    status_message: info.msg,
                    cancel_reason: data.cancelReason || "-",
                    cancel_staff: data.cancelledBy || "-",
                    created_at: createdTime,
                    reply_to: CENTER_EMAIL
                };

                const executeSending = async () => {
                    try {
                        const promises = [];
                        if (data.email && data.email.includes('@')) {
                            promises.push(emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateIdCustomer, { ...templateParams, to_email: data.email }));
                        }
                        for (const email of (centerEmails.length > 0 ? centerEmails : [CENTER_EMAIL])) {
                            if (email) promises.push(emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateIdStaff, { ...templateParams, to_email: email }));
                        }
                        for (const companyName of (data.selectedCompanies || [])) {
                            const config = BASE_COMPANY_DATA.find(c => c.name === companyName);
                            if (config && companyEmails[config.id]) {
                                for (const email of companyEmails[config.id]) {
                                    if (email) promises.push(emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateIdStaff, { ...templateParams, to_email: email }));
                                }
                            }
                        }
                        recordMailUsage(promises.length); // 送信数を記録し、閾値超過ならアラート
                        await Promise.allSettled(promises);
                    } catch (err) { console.error("Mail Error:", err); }
                };

                executeSending();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSubmittingRef.current) return;

                const emailToSubmit = formData.email.trim();
                if (formData.inputType !== 'staff' && (!emailToSubmit || !emailToSubmit.includes("@"))) {
                    return showNotification("正しいメールアドレスを入力してください", "error");
                }

                isSubmittingRef.current = true;
                setIsSubmitting(true);

                try {
                    const reservationData = { ...formData, email: emailToSubmit, status: 'confirmed', createdAt: firebase.firestore.FieldValue.serverTimestamp(), userId: user.uid };

                    const docRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reservations').add(reservationData);
                    setLastReservation({ ...reservationData, id: docRef.id }); // 完了画面の控え表示用
                    sendMails({ ...reservationData, id: docRef.id }, 'new');

                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    setIsCompleted(true);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (err) {
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    showNotification("エラーが発生しました", "error");
                }
            };

            const processCancel = async (e) => {
                e.preventDefault();
                if (!cancelStaffName.trim()) return;
                if (isSubmittingRef.current) return;

                isSubmittingRef.current = true;
                setIsSubmitting(true);

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reservations').doc(activeCancelRes.id).update({
                        status: 'cancelled', cancelledAt: firebase.firestore.FieldValue.serverTimestamp(), cancelledBy: cancelStaffName
                    });

                    sendMails({ ...activeCancelRes, cancelledBy: cancelStaffName, cancelReason: "管理者による取り消し" }, 'cancel');

                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    setShowCancelModal(false);
                    setCancelStaffName("");
                    showNotification("キャンセル完了しました。");
                } catch (err) {
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    showNotification("失敗しました", "error");
                }
            };

            const deleteReservationPermanently = async (id) => {
                if (!window.confirm("完全に削除しますか？")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reservations').doc(id).delete();
            };

            // === お客様セルフ管理：予約照会 ===
            const handleLookup = (e) => {
                e.preventDefault();
                const email = lookupEmail.trim();
                const phone = normalizePhone(lookupPhone);
                if (!email || !email.includes("@")) return showNotification("ご予約時のメールアドレスを入力してください", "error");
                if (!phone) return showNotification("ご予約時のお電話番号を入力してください", "error");
                setAuthedEmail(email);
                setAuthedPhone(phone);
                setLookupSearched(true);
            };

            const resetLookup = () => {
                setAuthedEmail(""); setAuthedPhone("");
                setLookupEmail(""); setLookupPhone("");
                setLookupSearched(false);
            };

            // === 日時変更（リスケジュール） ===
            const openReschedule = (res, origin = 'customer') => {
                setRescheduleRes(res);
                setRescheduleOrigin(origin);
                setRescheduleDate("");
                setRescheduleTime("");
                setRescheduleMonth(new Date(res.date ? res.date.replace(/-/g, '/') : Date.now()));
            };

            const confirmReschedule = async () => {
                if (!rescheduleRes || !rescheduleDate || !rescheduleTime) return;
                if (isSubmittingRef.current) return;
                isSubmittingRef.current = true;
                setIsSubmitting(true);
                const oldDate = rescheduleRes.date;
                const oldTime = rescheduleRes.time;
                try {
                    const historyEntry = {
                        from: { date: oldDate, time: oldTime },
                        to: { date: rescheduleDate, time: rescheduleTime },
                        at: new Date().toISOString(),
                        by: rescheduleOrigin === 'staff' ? 'スタッフ(管理画面)' : 'ご本人(WEB)'
                    };
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reservations').doc(rescheduleRes.id).update({
                        date: rescheduleDate,
                        time: rescheduleTime,
                        lastModifiedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastModifiedBy: historyEntry.by,
                        changeHistory: firebase.firestore.FieldValue.arrayUnion(historyEntry)
                    });
                    sendMails({ ...rescheduleRes, date: rescheduleDate, time: rescheduleTime, oldDate, oldTime }, 'change');
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    setRescheduleRes(null);
                    showNotification("予約日時を変更しました。確認メールをお送りします。");
                } catch (err) {
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    showNotification("変更に失敗しました。時間をおいて再度お試しください。", "error");
                }
            };

            // === お客様によるキャンセル ===
            const confirmCustomerCancel = async (e) => {
                e.preventDefault();
                if (!customerCancelRes) return;
                if (isSubmittingRef.current) return;
                isSubmittingRef.current = true;
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reservations').doc(customerCancelRes.id).update({
                        status: 'cancelled',
                        cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
                        cancelledBy: 'ご本人(WEB)',
                        cancelReason: customerCancelReason.trim() || "お客様都合"
                    });
                    sendMails({ ...customerCancelRes, cancelledBy: 'ご本人(WEB)', cancelReason: customerCancelReason.trim() || "お客様都合" }, 'cancel');
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    setCustomerCancelRes(null);
                    setCustomerCancelReason("");
                    showNotification("ご予約をキャンセルしました。");
                } catch (err) {
                    isSubmittingRef.current = false;
                    setIsSubmitting(false);
                    showNotification("キャンセルに失敗しました。お手数ですがお電話ください。", "error");
                }
            };

            const exportToCSV = () => {
                const targetData = reservations.filter(r => listSubTab === 'active' ? r.status !== 'cancelled' : r.status === 'cancelled');
                const headers = ["状況", "予約日", "時間", "お名前", "フリガナ", "人数", "電話", "メール", "見学先"];
                const rows = targetData.sort((a,b) => (b.date || "").localeCompare(a.date || "")).map(res => [
                    res.status === 'cancelled' ? "取消" : "有効", res.date, res.time, res.name, res.furigana, res.visitorCount, res.phone, res.email, (res.selectedCompanies || []).join(' / ')
                ]);
                let csvContent = "﻿" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.setAttribute("href", URL.createObjectURL(blob));
                link.setAttribute("download", `reservations_${new Date().toISOString().split('T')[0]}.csv`);
                link.click();
            };

            if (loading && !isCompleted) return <div className="flex h-screen items-center justify-center font-bold text-indigo-500 bg-slate-50 flex-col gap-4 text-center">
                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <p className="animate-pulse font-black text-sm uppercase tracking-widest">Loading Shinshu Housing Expo...</p>
            </div>;

            return (
                <div className="min-h-screen font-sans bg-slate-50 pb-12 selection:bg-indigo-100 text-left">

                    {/* ★ 共通ローディング・オーバーレイ ★ */}
                    {isSubmitting && (
                        <div className="fixed inset-0 bg-[#1E293B]/80 backdrop-blur-sm z-[2000] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 md:p-12 max-w-sm w-full shadow-2xl border-4 border-indigo-600 space-y-6 text-center animate-fade-in">
                                <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                <h3 className="text-2xl font-black text-slate-800 tracking-tight">処理中...</h3>
                                <p className="text-sm text-slate-500 font-bold">画面を閉じずにお待ちください</p>
                            </div>
                        </div>
                    )}

                    <nav className="bg-white/80 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-50 px-4 md:px-6 py-4 no-print shadow-sm">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2 md:gap-3">
                                <div className="bg-[#1E293B] p-2 rounded-xl md:rounded-2xl shadow-lg"><Icon name="home" className="text-white w-5 h-5 md:w-6 md:h-6" /></div>
                                <div>
                                    <h1 className="font-black text-lg md:text-xl tracking-tighter text-[#1E293B]">家ッス！信州</h1>
                                    <p className="hidden md:block text-[9px] font-bold text-slate-400 tracking-widest uppercase mt-1">Reservation Suite</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200 shadow-inner">
                                <button onClick={() => navigateToView('customer_form')} className={`px-3 md:px-5 py-1.5 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black transition-all ${view === 'customer_form' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-indigo-400'}`}>予約する</button>
                                <button onClick={() => navigateToView('lookup')} className={`px-3 md:px-5 py-1.5 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black transition-all ${view === 'lookup' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-indigo-400'}`}>確認・変更・取消</button>
                                {isStaffAuthenticated && (
                                    <button onClick={() => navigateToView('staff_dashboard')} className={`px-3 md:px-5 py-1.5 md:py-2 rounded-lg md:rounded-xl text-[10px] md:text-xs font-black transition-all ${view === 'staff_dashboard' ? 'bg-white shadow text-indigo-600' : 'text-slate-500 hover:text-indigo-400'}`}>スタッフ管理</button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-3 md:p-8">
                        {notification && (
                            <div className={`fixed bottom-6 right-6 z-[100] p-4 md:p-6 rounded-2xl md:rounded-3xl shadow-2xl flex items-center gap-4 text-white font-black animate-fade-in ${notification.type === 'error' ? 'bg-rose-500' : 'bg-indigo-600'}`}>
                                <Icon name="check" size={24}/> <span>{notification.msg}</span>
                            </div>
                        )}

                        {view === 'customer_form' ? (
                            isCompleted ? (
                                <div className="max-w-md mx-auto bg-white rounded-[3rem] shadow-2xl p-8 md:p-10 text-center space-y-6 border border-slate-100 animate-fade-in mt-6 md:mt-10">
                                    <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto shadow-inner"><Icon name="check" className="w-10 h-10" /></div>
                                    <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">ご予約完了</h2>
                                    {lastReservation && (
                                        <div className="bg-slate-50 rounded-3xl p-5 md:p-6 text-left space-y-3 border border-slate-100">
                                            <div className="flex justify-between items-center pb-3 border-b border-slate-200">
                                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">予約番号</span>
                                                <span className="font-black text-lg text-indigo-600 tracking-widest font-mono">{getResNo(lastReservation.id)}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-sm"><Icon name="calendar" className="w-4 h-4 text-slate-400 mt-0.5"/><span className="font-black text-slate-800">{formatNiceDate(lastReservation.date)} {lastReservation.time}〜</span></div>
                                            <div className="flex items-start gap-2 text-sm"><Icon name="home" className="w-4 h-4 text-slate-400 mt-0.5"/><span className="font-bold text-slate-700">{(lastReservation.selectedCompanies || []).join('、')}</span></div>
                                        </div>
                                    )}
                                    <p className="text-slate-500 font-bold leading-relaxed text-xs md:text-sm">控えのメールをお送りしました。<br/>日時の<span className="text-indigo-600">変更・キャンセル</span>は、上のメニュー「確認・変更・取消」からいつでも行えます。</p>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => { setLookupEmail(lastReservation?.email || ""); setLookupPhone(lastReservation?.phone || ""); navigateToView('lookup'); }} className="py-4 bg-white border-2 border-slate-200 text-slate-700 rounded-2xl font-black text-xs md:text-sm hover:border-indigo-400 transition-all">予約を確認・変更</button>
                                        <button onClick={() => window.location.reload()} className="py-4 bg-[#1E293B] text-white rounded-2xl font-black text-xs md:text-sm hover:bg-black transition-all shadow-xl">最初に戻る</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">

                                                                                {(r.selectedCompanies || []).map(companyName => (
                                                                                    <span key={companyName} className={`text-[6px] md:text-[7px] px-1 py-0.5 rounded border font-bold whitespace-nowrap truncate max-w-full not-italic no-underline ${!isCanceled && !isPast ? 'bg-white text-slate-600 border-slate-200 shadow-sm' : 'border-current/20'}`}>{companyName}</span>
                                                                                ))}
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="max-w-5xl mx-auto bg-white rounded-2xl md:rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 p-5 md:p-10 animate-fade-in">
                                        <div className="flex items-center gap-4 mb-8 border-b border-slate-50 pb-6">
                                            <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl shadow-sm"><Icon name="settings" className="w-8 h-8"/></div>
                                            <div>
                                                <h3 className="text-2xl font-black text-slate-800 tracking-tight">通知先メールアドレス設定</h3>
                                                <p className="text-xs font-bold text-slate-400">各拠点への予約・キャンセル情報を自動配信します。</p>
                                            </div>
                                        </div>

                                        <div className="mb-12 space-y-6">
                                            <div className="bg-slate-50 p-6 rounded-[2rem] border-2 border-indigo-100 relative">
                                                <h4 className="font-black text-indigo-700 text-lg mb-4 flex items-center gap-2"><Icon name="home" className="w-5 h-5"/> センターハウス共通設定 (最大2つ)</h4>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {[0, 1].map(i => (
                                                        <input key={`center-${i}`} type="email" value={centerEmails[i] || ""} onChange={(e) => {
                                                            const newEmails = [...centerEmails];
                                                            newEmails[i] = e.target.value;
                                                            setCenterEmails(newEmails);
                                                        }} className="p-4 bg-white rounded-xl font-bold border-2 border-slate-200 focus:border-indigo-600 outline-none text-sm shadow-inner" placeholder={`通知先アドレス ${i+1}`} />
                                                    ))}
                                                </div>
                                                <button onClick={() => saveCenterEmails(centerEmails)} className={`mt-5 px-8 py-3.5 rounded-xl font-black text-xs transition-all shadow-md active:scale-95 ${isCenterDirty ? 'bg-rose-500 hover:bg-rose-600 text-white animate-pulse shadow-rose-200' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                                    {isCenterDirty ? "変更を保存する (未保存)" : "センター設定を保存済み"}
                                                </button>
                                            </div>

                                            {/* ★ メール枠アラート通知先 ★ */}
                                            <div className="bg-amber-50 p-6 rounded-[2rem] border-2 border-amber-200 relative">
                                                <h4 className="font-black text-amber-700 text-lg mb-1 flex items-center gap-2"><Icon name="alertCircle" className="w-5 h-5"/> メール枠アラート通知先 (最大2つ)</h4>
                                                <p className="text-[11px] font-bold text-amber-600/80 mb-4 leading-relaxed">月の自動メール送信数が140通（70%）を超えると、以下の宛先へ「残り○通」の警告メールを自動送信します。<span className="underline decoration-amber-300">枠が尽きて予約メールが止まる前に手を打つため</span>の通知です。未設定の場合はセンター宛に送られます。</p>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {[0, 1].map(i => (
                                                        <input key={`mailalert-${i}`} type="email" value={mailAlertEmails[i] || ""} onChange={(e) => {
                                                            const newEmails = [...mailAlertEmails];
                                                            while (newEmails.length <= i) newEmails.push("");
                                                            newEmails[i] = e.target.value;
                                                            setMailAlertEmails(newEmails);
                                                        }} className="p-4 bg-white rounded-xl font-bold border-2 border-amber-200 focus:border-amber-500 outline-none text-sm shadow-inner" placeholder={`アラート通知先 ${i+1}`} />
                                                    ))}
                                                </div>
                                                <button onClick={saveMailAlertEmails} className={`mt-5 px-8 py-3.5 rounded-xl font-black text-xs transition-all shadow-md active:scale-95 ${isMailAlertDirty ? 'bg-rose-500 hover:bg-rose-600 text-white animate-pulse shadow-rose-200' : 'bg-amber-600 text-white hover:bg-amber-700'}`}>
                                                    {isMailAlertDirty ? "変更を保存する (未保存)" : "アラート通知先を保存済み"}
                                                </button>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6">
                                            {BASE_COMPANY_DATA.map(c => {
                                                const isDirty = isCompanyDirty(c.id);
                                                return (
                                                    <div key={c.id} className={`bg-white p-6 rounded-[2rem] border-2 transition-all shadow-sm ${isDirty ? 'border-rose-200 bg-rose-50/10' : 'border-slate-100'}`}>
                                                        <div className="flex items-center gap-4 mb-4">
                                                            <img src={c.image} className="w-12 h-12 rounded-full object-cover border-2 border-indigo-100 shadow-sm" />
                                                            <span className="font-black text-lg text-slate-800">{c.name} <span className="text-xs text-slate-400 font-bold">(最大3つ)</span></span>
                                                        </div>
                                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                                            {[0, 1, 2].map(i => (
                                                                <input key={`${c.id}-${i}`} type="email" value={(companyEmails[c.id] || [])[i] || ""} onChange={(e) => {
                                                                    const newEmails = [...(companyEmails[c.id] || ["", "", ""])];
                                                                    newEmails[i] = e.target.value;
                                                                    setCompanyEmails({ ...companyEmails, [c.id]: newEmails });
                                                                }} className="p-3.5 bg-slate-50 rounded-xl font-bold border-2 border-slate-200 focus:border-indigo-600 outline-none text-xs shadow-inner" placeholder={`通知先 ${i+1}`} />
                                                            ))}
                                                        </div>
                                                        <button onClick={() => saveCompanyEmails(c.id, companyEmails[c.id] || [])} className={`mt-4 px-6 py-3 rounded-xl font-black text-xs transition-all shadow-sm active:scale-95 ${isDirty ? 'bg-rose-500 hover:bg-rose-600 text-white animate-pulse shadow-rose-200' : 'bg-[#1E293B] text-white hover:bg-black'}`}>
                                                            {isDirty ? "変更を保存 (未保存)" : "この会社の設定は保存済み"}
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="max-w-7xl mx-auto px-4 py-8 md:py-12 text-center no-print">
                        <div className="flex flex-col items-center gap-4">
                            <p className="text-slate-300 text-[10px] font-black tracking-widest uppercase">© Housing Expo System</p>
                            <button onClick={isStaffAuthenticated ? handleStaffLogout : () => setShowLoginModal(true)} className="text-slate-300 hover:text-indigo-400 transition-colors flex items-center gap-2 text-[10px] font-black tracking-widest uppercase group">
                                <Icon name={isStaffAuthenticated ? "logout" : "lock"} className="w-3 h-3 group-hover:scale-110"/>
                                <span>{isStaffAuthenticated ? "Logout" : "Staff Login"}</span>
                            </button>
                        </div>
                    </footer>

                    {/* モーダル (Googleサイト・レスポンシブ対応済み) */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-[#1E293B]/60 backdrop-blur-md z-[1000] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] p-8 md:p-12 max-w-sm w-full shadow-2xl border border-slate-100 space-y-6 md:space-y-8 text-center">
                                <div className="p-4 bg-indigo-50 text-indigo-600 rounded-full w-fit mx-auto"><Icon name="lock" className="w-10 h-10"/></div>
                                <h3 className="text-2xl font-black text-slate-800">スタッフ認証</h3>
                                <form onSubmit={handleStaffAuth} className="space-y-6 text-center">
                                    <input autoFocus type="password" value={loginPass} onChange={e => setLoginPass(e.target.value)} className="w-full p-4 md:p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-center text-3xl tracking-[0.5em] focus:border-indigo-600 outline-none" placeholder="****" />
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 py-3 text-slate-400 font-black text-xs uppercase tracking-widest">閉じる</button>
                                        <button type="submit" className="flex-1 py-3 md:py-4 bg-indigo-600 text-white rounded-xl md:rounded-2xl font-black text-xs md:text-sm uppercase tracking-widest shadow-lg">Login</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showCancelModal && (
                        <div className="fixed inset-0 bg-[#1E293B]/60 backdrop-blur-md z-[1000] flex items-center justify-center p-4 animate-fade-in text-center">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] p-8 md:p-12 max-w-sm w-full shadow-2xl border border-slate-100 space-y-6 md:space-y-8">
                                <div className="p-4 bg-rose-50 text-rose-600 rounded-full w-fit mx-auto shadow-inner"><Icon name="alertCircle" className="w-10 h-10"/></div>
                                <h3 className="text-2xl font-black text-slate-800">予約の取消</h3>
                                <form onSubmit={processCancel} className="space-y-6 text-left">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-rose-400 ml-4 uppercase tracking-widest">担当者名 (必須)</label>
                                        <input required value={cancelStaffName} onChange={e => setCancelStaffName(e.target.value)} className="w-full p-4 md:p-5 bg-slate-50 border-2 border-slate-100 rounded-xl md:rounded-2xl font-black text-center focus:border-rose-600 outline-none" placeholder="例：事務 田中" />
                                    </div>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => setShowCancelModal(false)} className="flex-1 py-3 text-slate-400 font-black text-xs uppercase tracking-widest">戻る</button>
                                        <button type="submit" className="flex-1 py-3 md:py-4 bg-rose-600 text-white rounded-xl md:rounded-2xl font-black text-xs md:text-sm uppercase tracking-widest shadow-lg">取消確定</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ★ お客様によるキャンセル確認モーダル ★ */}
                    {customerCancelRes && (
                        <div className="fixed inset-0 bg-[#1E293B]/60 backdrop-blur-md z-[1500] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] p-7 md:p-10 max-w-md w-full shadow-2xl border border-slate-100 space-y-5">
                                <div className="p-4 bg-rose-50 text-rose-600 rounded-full w-fit mx-auto shadow-inner"><Icon name="alertCircle" className="w-9 h-9"/></div>
                                <h3 className="text-2xl font-black text-slate-800 text-center">ご予約をキャンセル</h3>
                                <div className="bg-slate-50 rounded-2xl p-4 text-center border border-slate-100">
                                    <div className="font-black text-slate-800">{formatNiceDate(customerCancelRes.date)} {customerCancelRes.time}〜</div>
                                    <div className="text-xs font-bold text-slate-500 mt-1">{(customerCancelRes.selectedCompanies || []).join('、')}</div>
                                </div>
                                <p className="text-xs font-bold text-slate-500 text-center leading-relaxed">上記のご予約をキャンセルします。よろしいですか？<br/>この操作は取り消せません。</p>
                                <form onSubmit={confirmCustomerCancel} className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-3 uppercase tracking-widest">キャンセル理由（任意）</label>
                                        <input value={customerCancelReason} onChange={e => setCustomerCancelReason(e.target.value)} className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-rose-500 text-sm" placeholder="例：予定が合わなくなったため" />
                                    </div>
                                    <div className="flex gap-3">
                                        <button type="button" onClick={() => { setCustomerCancelRes(null); setCustomerCancelReason(""); }} className="flex-1 py-4 text-slate-500 font-black text-xs uppercase tracking-widest bg-slate-100 rounded-2xl hover:bg-slate-200 transition-all">やめる</button>
                                        <button type="submit" className="flex-1 py-4 bg-rose-600 hover:bg-rose-700 text-white rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">キャンセルする</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ★ 日時変更（リスケジュール）オーバーレイ ★ */}
                    {rescheduleRes && (
                        <div className="fixed inset-0 bg-[#1E293B]/70 backdrop-blur-md z-[1500] flex items-start md:items-center justify-center p-2 md:p-4 animate-fade-in overflow-y-auto">
                            <div className="bg-white rounded-[2rem] md:rounded-[3rem] max-w-2xl w-full shadow-2xl border border-slate-100 my-4 md:my-8 overflow-hidden">
                                <div className="bg-[#1E293B] p-6 md:p-8 text-white flex items-center justify-between">
                                    <div>
                                        <div className="text-indigo-400 font-bold tracking-widest text-[10px] uppercase">Change Date & Time</div>
                                        <h3 className="text-xl md:text-2xl font-black tracking-tight mt-1">予約日時の変更</h3>
                                    </div>
                                    <button onClick={() => setRescheduleRes(null)} className="text-slate-300 hover:text-white text-3xl leading-none font-black px-2">×</button>
                                </div>

                                <div className="p-4 md:p-8 space-y-6">
                                    {/* 変更前 → 変更後 プレビュー */}
                                    <div className="flex items-center gap-3 bg-slate-50 rounded-2xl p-4 border border-slate-100">
                                        <div className="flex-1 text-center">
                                            <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">変更前</div>
                                            <div className="font-black text-slate-700 text-sm">{formatNiceDate(rescheduleRes.date)}</div>
                                            <div className="font-black text-slate-500 text-xs">{rescheduleRes.time}〜</div>
                                        </div>
                                        <Icon name="arrowRight" className="w-6 h-6 text-indigo-400 flex-shrink-0"/>
                                        <div className={`flex-1 text-center rounded-xl py-1 ${rescheduleDate && rescheduleTime ? 'bg-indigo-50' : ''}`}>
                                            <div className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-1">変更後</div>
                                            <div className="font-black text-indigo-700 text-sm">{rescheduleDate ? formatNiceDate(rescheduleDate) : '日付を選択'}</div>
                                            <div className="font-black text-indigo-500 text-xs">{rescheduleTime ? `${rescheduleTime}〜` : '　'}</div>
                                        </div>
                                    </div>

                                    <div className="p-3 bg-amber-50 rounded-xl border border-amber-200 text-[11px] font-bold text-amber-800 leading-relaxed">
                                        見学先（{(rescheduleRes.selectedCompanies || []).join('、')}）と滞在時間（{rescheduleRes.duration}時間）はそのままで、日時のみ変更します。見学先も変えたい場合は、一度キャンセルして再予約してください。
                                    </div>

                                    {/* カレンダー */}
                                    <div className="bg-slate-50 p-2 md:p-3 rounded-[1.5rem] md:rounded-[2rem] border-2 border-slate-200 shadow-inner">
                                        <div className="flex items-center justify-between p-3 md:p-4 bg-white rounded-t-[1.25rem] md:rounded-t-[1.75rem] mb-1">
                                            <button type="button" onClick={() => setRescheduleMonth(new Date(new Date(rescheduleMonth).setMonth(rescheduleMonth.getMonth() - 1)))} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="chevronLeft" className="w-6 h-6 text-indigo-600"/></button>
                                            <div className="font-black text-base md:text-xl tracking-tighter text-slate-800">{rescheduleMonth.getFullYear()}年 {rescheduleMonth.getMonth() + 1}月</div>
                                            <button type="button" disabled={rescheduleMonth.getFullYear() >= 2027} onClick={() => setRescheduleMonth(new Date(new Date(rescheduleMonth).setMonth(rescheduleMonth.getMonth() + 1)))} className={`p-2 rounded-full transition-colors ${rescheduleMonth.getFullYear() >= 2027 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-slate-100'}`}><Icon name="chevronRight" className="w-6 h-6 text-indigo-600"/></button>
                                        </div>
                                        <div className="grid grid-cols-7 gap-1 bg-white/50 p-2 rounded-b-[1.25rem] md:rounded-b-[1.75rem]">
                                            {['月','火','水','木','金','土','日'].map(w => <div key={w} className="text-center text-[8px] md:text-[10px] font-black text-slate-400 py-1 uppercase tracking-widest">{w}</div>)}
                                            {(() => {
                                                const year = rescheduleMonth.getFullYear();
                                                const month = rescheduleMonth.getMonth();
                                                const firstDay = new Date(year, month, 1).getDay();
                                                const lastDate = new Date(year, month + 1, 0).getDate();
                                                const days = [];
                                                const offset = (firstDay === 0 ? 7 : firstDay) - 1;
                                                for (let i = 0; i < (offset < 0 ? 0 : offset); i++) days.push(null);
                                                for (let i = 1; i <= lastDate; i++) days.push({ day: i, dateStr: `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}` });
                                                return days.map((d, i) => {
                                                    if (!d) return <div key={i}></div>;
                                                    const status = getEditDayStatus(d.dateStr);
                                                    const isSelected = rescheduleDate === d.dateStr;
                                                    return <button key={d.dateStr} type="button" disabled={status === 'past' || status === 'closed' || status === 'full'} onClick={() => { setRescheduleDate(d.dateStr); setRescheduleTime(""); }} className={`h-12 md:h-16 rounded-xl md:rounded-2xl flex flex-col items-center justify-center border-2 transition-all ${isSelected ? 'bg-indigo-600 text-white shadow-xl scale-105 border-indigo-600 z-10 font-black' : 'bg-white border-slate-100 hover:border-indigo-400'} ${status === 'closed' ? 'bg-rose-50 border-rose-100 opacity-50' : ''} ${(status === 'past' || status === 'full') ? 'opacity-20 grayscale cursor-not-allowed border-none' : ''}`}>
                                                        <span className="text-[8px] md:text-[10px] font-bold mb-0.5 opacity-60">{d.day}</span>
                                                        <div className="text-xs md:text-lg font-black">{status === 'closed' ? '×' : (status === 'available' ? '○' : '')}</div>
                                                    </button>;
                                                });
                                            })()}
                                        </div>
                                    </div>

                                    {/* 時間選択 */}
                                    {rescheduleDate && (
                                        <div className="grid grid-cols-3 md:grid-cols-4 gap-2 md:gap-3 animate-fade-in">
                                            {TIME_SLOTS.map(t => {
                                                const available = isEditSlotAvailable(rescheduleDate, t);
                                                return <button key={t} type="button" disabled={!available} onClick={() => setRescheduleTime(t)} className={`p-3 md:p-5 rounded-xl md:rounded-2xl border-2 font-black text-sm md:text-lg transition-all ${!available ? 'bg-slate-50 text-slate-200 border-slate-100' : rescheduleTime === t ? 'bg-indigo-600 text-white border-indigo-600 shadow-xl scale-105' : 'bg-white border-slate-100 text-slate-500 hover:border-indigo-500'}`}>{t}</button>;
                                            })}
                                        </div>
                                    )}

                                    <div className="flex gap-3 pt-2">
                                        <button type="button" onClick={() => setRescheduleRes(null)} className="flex-1 py-4 text-slate-500 font-black text-xs uppercase tracking-widest bg-slate-100 rounded-2xl hover:bg-slate-200 transition-all">やめる</button>
                                        <button type="button" disabled={!rescheduleDate || !rescheduleTime || isSubmitting} onClick={confirmReschedule} className={`flex-[2] py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all ${(!rescheduleDate || !rescheduleTime) ? 'bg-slate-300 text-white cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700 text-white'}`}>この日時に変更する</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
